<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{url_for('js', scr='UI.js')}}"></script>
</head>
<body>
    <nav>
        <h1>
            {{title}}
        </h1>
        <form action="/sl" method="post">
            <select name="language" id="language">
                <option value="en" {% if language == 'en' %}selected{% endif %}>English</option>
                <option value="es" {% if language == 'es' %}selected{% endif %}>Español</option>
                <option value="fr" {% if language == 'fr' %}selected{% endif %}>Français</option>
                <option value="de" {% if language == 'de' %}selected{% endif %}>Deutsch</option>
            </select>
            <button type="submit">Set Language</button>
            
        </form>
    </nav>
    <div class="middle">
        <nav>
            <h2>
            {% if language == 'en' %}
                Editing {{file}}
            {% elif language == 'es' %}
                Editar {{file}}
            {% elif language == 'de' %}
                {{file}} bearbeiten
            {% elif language == 'fr' %}
                Modification de {{file}}
            {% else %}
                Editing {{file}}
            {% endif %}
            </h2>
            
            
        </nav>

        <br>

    </div>
    <div class="middle" style="background-color: rgb(41, 41, 41); height: 50svh; justify-content: start; align-items: start;">
        <nav style="align-self:flex-start; background-color: #0000;">
                <button type="submit" style="margin-right: 20px;"><img src="static/save.png" alt="save"> Save</button>
                <button type="submit" style="margin:0%;" ><img src="static/download.png" alt="download"> Download</button>
                <button type="submit" onclick="window.location.href='{{path}}'"> Close file </button>
            </nav>
        <ul>
            
            <textarea placeholder="Enter text here.. (empty)" style="resize: both;"></textarea>
        </ul>
    </div>
</body>
</html>
